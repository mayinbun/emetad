<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will You Date Me? 💀</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* THEME — swap this block for new variants */
    :root {
      --bg: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --accent: #8b0000;
      --accent2: #6a0dad;
      --text: #e8e8e8;
      --text-dim: #888;
      --btn-yes-bg: #8b0000;
      --btn-yes-hover: #a80000;
      --btn-no-bg: #1a1a1a;
      --btn-no-border: #555;
      --font: 'Cinzel', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #page1, #page2, #page3 {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      padding: 2rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    #page2, #page3, #page4 { display: none; }

    .date-picker-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: min(360px, 90vw);
      margin-bottom: 2rem;
    }

    .date-label {
      font-family: var(--font);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-dim);
      align-self: flex-start;
    }

    .gothic-input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      background: var(--bg-secondary);
      border: 1px solid #333;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color-scheme: dark;
    }

    .gothic-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    .confirm-btn {
      margin-top: 1rem;
      padding: 1rem 2.5rem;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      background: var(--btn-yes-bg);
      color: var(--text);
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .confirm-btn:hover {
      background: var(--btn-yes-hover);
      box-shadow: 0 0 20px var(--accent);
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    @keyframes fadeInScale {
      0%   { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    #celebration-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #celebration-overlay.active {
      display: flex;
    }

    #celebration-text {
      font-family: var(--font);
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 900;
      color: var(--text);
      text-shadow: 0 0 40px var(--accent), 0 0 80px var(--accent2);
      text-align: center;
      animation: fadeInScale 0.6s ease forwards;
      padding: 1rem;
    }

    .food-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .food-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 2rem 2.5rem;
      background: var(--bg-secondary);
      border: 1px solid #333;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      user-select: none;
    }

    .food-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .food-card.selected {
      border-color: var(--accent2);
      box-shadow: 0 0 20px var(--accent2), 0 0 40px var(--accent);
    }

    .food-emoji {
      font-size: 3rem;
      transition: opacity 0.3s ease;
    }

    .food-emoji.fade-out { opacity: 0; }

    .food-label {
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text);
    }

    .food-confirm-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.75rem;
    }

    .food-confirm-btns button {
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 0.5rem 1.25rem;
      background: var(--bg-secondary);
      border: 1px solid var(--accent);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .food-confirm-btns button:hover {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    @keyframes skullPulse {
      0%, 100% { transform: scale(1) rotate(-5deg); text-shadow: 0 0 20px var(--accent); }
      50%       { transform: scale(1.15) rotate(5deg); text-shadow: 0 0 60px var(--accent), 0 0 100px var(--accent2); }
    }

    @keyframes slideUp {
      0%   { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .confirmed-skull {
      font-size: 5rem;
      animation: skullPulse 2s ease-in-out infinite;
      margin-bottom: 1.5rem;
    }

    .confirmed-heading {
      animation: slideUp 0.6s ease forwards;
    }

    .confirmed-date {
      font-family: var(--font);
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      color: var(--text);
      text-shadow: 0 0 20px var(--accent2);
      margin: 1.5rem 0 0.5rem;
      animation: slideUp 0.6s 0.2s ease both;
      font-style: italic;
    }

    .confirmed-sub {
      font-family: var(--font);
      font-size: 1rem;
      color: var(--text-dim);
      letter-spacing: 2px;
      animation: slideUp 0.6s 0.4s ease both;
    }

    .food-confirmation {
      font-family: var(--font);
      font-size: 1.1rem;
      color: var(--accent2);
      text-shadow: 0 0 10px var(--accent2);
      min-height: 2rem;
      font-style: italic;
    }

    .float-emoji {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      animation: floatUp linear forwards;
      z-index: 99;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(139,0,0,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(106,13,173,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .portrait-frame {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      box-shadow: 0 0 24px rgba(139,0,0,0.6), 0 0 60px rgba(106,13,173,0.25), inset 0 0 20px rgba(0,0,0,0.4);
      overflow: hidden;
      margin-bottom: 1.5rem;
      flex-shrink: 0;
    }

    .portrait-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: contrast(1.05) brightness(0.92);
    }

    .main-heading {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      color: var(--text);
      margin-bottom: 1rem;
      text-shadow: 0 0 20px var(--accent);
    }

    .subtext {
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: var(--text-dim);
      margin-bottom: 3rem;
      font-style: italic;
    }

    .button-area {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    #btn-yes {
      padding: 1rem 3rem;
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 700;
      background: var(--btn-yes-bg);
      color: var(--text);
      border: 1px solid var(--accent);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      box-shadow: 0 0 18px rgba(139,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    #btn-yes:hover {
      background: var(--btn-yes-hover);
      box-shadow: 0 0 32px rgba(139,0,0,0.8), 0 0 60px rgba(139,0,0,0.3);
      transform: translateY(-2px);
    }

    #btn-yes:active { transform: translateY(0); }

    #btn-no {
      padding: 1rem 3rem;
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 400;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid #444;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: transform 0.3s ease, opacity 0.3s ease, border-color 0.2s, color 0.2s;
    }

    #btn-no:hover {
      border-color: #666;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="page1">
    <div class="portrait-frame">
      <img src="me.png" alt="" class="portrait-img">
    </div>
    <h1 class="main-heading">Will you date me? 💀</h1>
    <p class="subtext">Even death can't stop this feeling.</p>
    <div class="button-area">
      <button id="btn-yes" onclick="handleYesClick()">Yes 💀</button>
      <button id="btn-no" onclick="handleNoClick()">No</button>
    </div>
  </div>
  <div id="celebration-overlay">
    <div id="celebration-text">SHE SAID YES 💀🖤</div>
  </div>

  <div id="page2">
    <h1 class="main-heading">What we feeling? 💀</h1>
    <p class="subtext">Choose wisely.</p>
    <div class="food-grid">
      <div class="food-card" data-food="Burger" onclick="pickFood(this)">
        <span class="food-emoji">🍔</span>
        <span class="food-label">Burger</span>
      </div>
      <div class="food-card" data-food="Sushi" onclick="pickFood(this)">
        <span class="food-emoji">🍣</span>
        <span class="food-label">Sushi</span>
      </div>
      <div class="food-card" data-food="Pizza" onclick="pickFood(this)">
        <span class="food-emoji">🍕</span>
        <span class="food-label">Pizza</span>
      </div>
      <div class="food-card" data-food="Coffee" onclick="pickFood(this)">
        <span class="food-emoji">☕</span>
        <span class="food-label">Coffee</span>
      </div>
    </div>
    <p id="food-confirmation" class="food-confirmation"></p>
  </div>
  <div id="page4">
    <div class="confirmed-skull">💀</div>
    <h1 class="main-heading confirmed-heading">It's official.</h1>
    <p id="confirmed-date" class="confirmed-date"></p>
    <p class="confirmed-sub">Don't be late. 💀</p>
  </div>

  <div id="page3">
    <h1 class="main-heading">When? 💀</h1>
    <p class="subtext">Pick your moment of doom.</p>
    <div class="date-picker-container">
      <label class="date-label" for="date-input">Date</label>
      <input id="date-input" type="date" class="gothic-input">
      <label class="date-label" for="time-input">Time</label>
      <input id="time-input" type="time" class="gothic-input">
      <button class="confirm-btn" onclick="confirmDate()">It's a date 💀</button>
    </div>
    <p id="date-confirmation" class="food-confirmation"></p>
  </div>
  <script>
    const btnYes = document.getElementById('btn-yes');
    const btnNo = document.getElementById('btn-no');


    let noClickCount = 0;
    const NO_MAX_CLICKS = 5;

    const CELEBRATION_EMOJIS = ['💀', '🦇', '🥀', '🖤', '🕸️', '☠️'];

    function spawnEmoji() {
      const el = document.createElement('span');
      el.className = 'float-emoji';
      el.textContent = CELEBRATION_EMOJIS[Math.floor(Math.random() * CELEBRATION_EMOJIS.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.bottom = '-2rem';
      const duration = 1.5 + Math.random() * 2;
      el.style.animationDuration = duration + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000);
    }

    function celebrate() {
      const overlay = document.getElementById('celebration-overlay');
      overlay.classList.add('active');
      let spawned = 0;
      const interval = setInterval(() => {
        for (let i = 0; i < 5; i++) spawnEmoji();
        spawned++;
        if (spawned >= 10) clearInterval(interval);
      }, 200);
      setTimeout(showPage2, 2500);
    }

    function handleYesClick() {
      celebrate();
    }

    function showPage2() {
      document.getElementById('page1').style.display = 'none';
      document.getElementById('celebration-overlay').style.display = 'none';
      document.getElementById('page2').style.display = 'flex';
    }

    function pickFood(card) {
      document.querySelectorAll('.food-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      const food = card.dataset.food;
      const el = document.getElementById('food-confirmation');
      el.textContent = `She wants ${food}. You better deliver. 💀`;
      setTimeout(showPage3, 1800);
    }

    function showPage3() {
      document.getElementById('page2').style.display = 'none';
      document.getElementById('page3').style.display = 'flex';
    }

    function confirmDate() {
      const date = document.getElementById('date-input').value;
      const time = document.getElementById('time-input').value;
      if (!date || !time) {
        document.getElementById('date-confirmation').textContent = 'Pick both a date and time, mortal. 💀';
        return;
      }
      const formatted = new Date(date + 'T' + time).toLocaleString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
      document.getElementById('confirmed-date').textContent = formatted;
      document.getElementById('page3').style.display = 'none';
      document.getElementById('page4').style.display = 'flex';
      launchCelebration();
    }

    function launchCelebration() {
      let spawned = 0;
      const interval = setInterval(() => {
        for (let i = 0; i < 4; i++) spawnEmoji();
        spawned++;
        if (spawned >= 15) clearInterval(interval);
      }, 300);
      playFFVictory();
    }

    function playFFVictory() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      // Organ pipe sound: fundamental + harmonics via additive synthesis
      function organNote(freq, start, dur, vol = 0.18) {
        const t = ctx.currentTime + start;
        [1, 2, 3, 4].forEach((harmonic, i) => {
          const osc = ctx.createOscillator();
          const env = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq * harmonic;
          const hVol = vol / (i + 1);
          env.gain.setValueAtTime(0, t);
          env.gain.linearRampToValueAtTime(hVol, t + 0.04);
          env.gain.setValueAtTime(hVol, t + dur - 0.08);
          env.gain.linearRampToValueAtTime(0, t + dur);
          osc.connect(env);
          env.connect(ctx.destination);
          osc.start(t);
          osc.stop(t + dur + 0.1);
        });
      }

      // Chord = multiple notes at once
      function chord(freqs, start, dur, vol) {
        freqs.forEach(f => organNote(f, start, dur, vol));
      }

      // Bach Toccata and Fugue in D minor — iconic opening
      // Single high A stab
      organNote(880.00, 0.00, 0.25);

      // Rapid descending run A5→D5
      organNote(880.00, 0.35, 0.08);
      organNote(783.99, 0.43, 0.08);
      organNote(698.46, 0.51, 0.08);
      organNote(659.25, 0.59, 0.08);
      organNote(587.33, 0.67, 0.35);

      // Full D minor chord crash
      chord([146.83, 220.00, 293.66, 349.23, 440.00, 587.33], 1.1, 0.55, 0.15);

      // Descending bass line D→C→B→Bb
      organNote(293.66, 1.75, 0.28);
      organNote(261.63, 2.05, 0.28);
      organNote(246.94, 2.35, 0.28);
      organNote(233.08, 2.65, 0.45);

      // Final A minor resolution chord
      chord([110.00, 164.81, 220.00, 329.63, 440.00], 3.2, 1.4, 0.16);
    }

    function handleNoClick() {
      noClickCount++;
      const scale = Math.max(0, 1 - noClickCount * 0.18);
      btnNo.style.transform = `scale(${scale})`;
      btnNo.style.opacity = scale;

      if (noClickCount >= NO_MAX_CLICKS) {
        btnNo.style.transition = 'transform 0.3s ease, opacity 0.5s ease';
        btnNo.style.opacity = '0';
        setTimeout(() => btnNo.remove(), 500);
      }
    }
  </script>
</body>
</html>
