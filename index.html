<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will You Date Me? 💀</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@400;700;900&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    /* THEME — swap this block for new variants */
    :root {
      --bg: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --accent: #8b0000;
      --accent2: #6a0dad;
      --text: #e8e8e8;
      --text-dim: #888;
      --btn-yes-bg: #8b0000;
      --btn-yes-hover: #a80000;
      --btn-no-bg: #1a1a1a;
      --btn-no-border: #555;
      --font: 'Cinzel', serif;
      --font-heading: 'Cinzel Decorative', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #page1, #page2, #page3, #page4 {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      padding: 2rem 1.5rem;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    #page2, #page3, #page4 { display: none; }

    body.bun-theme {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    body.bun-theme #page1,
    body.bun-theme #page2,
    body.bun-theme #page3,
    body.bun-theme #page4 {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      max-width: 560px;
      width: 90vw;
      min-height: unset;
      padding: 3rem 2rem;
      box-shadow: 0 8px 32px rgba(74,144,217,0.2);
    }

    body.bun-theme .food-card {
      background: rgba(255,255,255,0.75);
      border-color: #a8c8e8;
    }

    body.bun-theme .food-label {
      color: #0d1e2e;
    }

    body.bun-theme .food-confirm-btns button {
      background: rgba(255,255,255,0.75);
      border-color: #4a90d9;
      color: #0d1e2e;
    }

    body.bun-theme .food-confirm-btns button:hover {
      background: #4a90d9;
      color: #ffffff;
      box-shadow: 0 0 10px rgba(74,144,217,0.6);
    }

    body.bun-theme .gothic-input {
      background: rgba(255,255,255,0.75);
      border-color: #a8c8e8;
      color: #0d1e2e;
      color-scheme: light;
    }

    body.bun-theme .gothic-input:focus {
      border-color: #4a90d9;
      box-shadow: 0 0 12px rgba(74,144,217,0.4);
    }

    body.bun-theme .date-label {
      color: #2a4a6a;
    }

    body.bun-theme #celebration-overlay {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    body.bun-theme #celebration-text {
      color: #0d1e2e;
      text-shadow: 0 2px 8px rgba(255,255,255,0.8), 0 0 30px rgba(74,144,217,0.5);
    }

    .date-picker-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: min(360px, 90vw);
      margin-bottom: 2rem;
    }

    .date-label {
      font-family: var(--font);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-dim);
      align-self: flex-start;
    }

    .gothic-input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      background: var(--bg-secondary);
      border: 1px solid #333;
      color: var(--text);
      font-family: var(--font);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color-scheme: dark;
    }

    .gothic-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    .confirm-btn {
      margin-top: 1rem;
      padding: 1rem 2.5rem;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      background: var(--btn-yes-bg);
      color: var(--text);
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .confirm-btn:hover {
      background: var(--btn-yes-hover);
      box-shadow: 0 0 20px var(--accent);
    }

    @keyframes ironShake1 {
      0%,100% { transform: translateX(0); }
      20%  { transform: translateX(-6px); }
      40%  { transform: translateX(5px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(3px); }
    }

    @keyframes ironShake2 {
      0%,100% { transform: translateX(0); }
      15%  { transform: translateX(-10px) rotate(-2deg); }
      35%  { transform: translateX(9px) rotate(2deg); }
      55%  { transform: translateX(-7px) rotate(-1deg); }
      75%  { transform: translateX(6px) rotate(1deg); }
    }

    @keyframes ironScanLine {
      0%   { background-position: 0% 0%; opacity: 0.6; }
      100% { background-position: 0% 100%; opacity: 0; }
    }

    @keyframes ironFragTL {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(-60px,-50px) rotate(-25deg); opacity: 0; }
    }
    @keyframes ironFragTR {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(60px,-45px) rotate(20deg); opacity: 0; }
    }
    @keyframes ironFragBL {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50px,50px) rotate(-15deg); opacity: 0; }
    }
    @keyframes ironFragBR {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(55px,45px) rotate(30deg); opacity: 0; }
    }

    @keyframes bunSingleHop {
      0%   { transform: translate(var(--bun-x, 0px), 0px) rotate(0deg); }
      35%  { transform: translate(calc(var(--bun-x, 0px) + 18px), -22px) rotate(-8deg); }
      70%  { transform: translate(calc(var(--bun-x, 0px) + 36px), 0px) rotate(4deg); }
      100% { transform: translate(calc(var(--bun-x, 0px) + 36px), 0px) rotate(0deg); }
    }

    @keyframes bunFlyOff {
      0%   { transform: translate(var(--bun-x, 0px), 0px) rotate(0deg); opacity: 1; }
      30%  { transform: translate(calc(var(--bun-x, 0px) + 24px), -30px) rotate(-10deg); opacity: 1; }
      100% { transform: translate(150vw, -40px) rotate(20deg); opacity: 0; }
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }


    @keyframes fadeInScale {
      0%   { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    #celebration-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #celebration-overlay.active {
      display: flex;
    }

    #celebration-text {
      font-family: var(--font);
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 900;
      color: var(--text);
      text-shadow: 0 0 40px var(--accent), 0 0 80px var(--accent2);
      text-align: center;
      animation: fadeInScale 0.6s ease forwards;
      padding: 1rem;
    }

    .food-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .food-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 2rem 2.5rem;
      background: var(--bg-secondary);
      border: 1px solid #333;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      user-select: none;
    }

    .food-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    .food-card.selected {
      border-color: var(--accent2);
      box-shadow: 0 0 20px var(--accent2), 0 0 40px var(--accent);
    }

    .food-emoji {
      font-size: 3rem;
      transition: opacity 0.3s ease;
    }

    .food-emoji.fade-out { opacity: 0; }

    .food-label {
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text);
    }

    .food-confirm-btns {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.75rem;
    }

    .food-confirm-btns button {
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 0.5rem 1.25rem;
      background: var(--bg-secondary);
      border: 1px solid var(--accent);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .food-confirm-btns button:hover {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    @keyframes skullPulse {
      0%, 100% { transform: scale(1) rotate(-5deg); text-shadow: 0 0 20px var(--accent); }
      50%       { transform: scale(1.15) rotate(5deg); text-shadow: 0 0 60px var(--accent), 0 0 100px var(--accent2); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.25); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.15); }
      56%       { transform: scale(1); }
    }

    @keyframes slideUp {
      0%   { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .confirmed-skull {
      font-size: 5rem;
      animation: heartbeat 1.2s ease-in-out infinite;
      margin-bottom: 1.5rem;
    }

    .confirmed-heading {
      animation: slideUp 0.6s ease forwards;
    }

    .confirmed-date {
      font-family: var(--font);
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      color: var(--text);
      text-shadow: 0 0 20px var(--accent2);
      margin: 1.5rem 0 0.5rem;
      animation: slideUp 0.6s 0.2s ease both;
      font-style: italic;
    }

    .confirmed-sub {
      font-family: var(--font);
      font-size: 1rem;
      color: var(--text-dim);
      letter-spacing: 2px;
      animation: slideUp 0.6s 0.4s ease both;
    }

    .food-confirmation {
      font-family: var(--font);
      font-size: 1.1rem;
      color: var(--accent2);
      text-shadow: 0 0 10px var(--accent2);
      min-height: 2rem;
      font-style: italic;
    }

    .float-emoji {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      animation: floatUp linear forwards;
      z-index: 99;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(ellipse at 20% 50%, color-mix(in srgb, var(--accent) 8%, transparent) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(106,13,173,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .portrait-frame {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      box-shadow: 0 0 30px var(--accent), 0 0 80px color-mix(in srgb, var(--accent) 50%, transparent), 0 0 120px color-mix(in srgb, var(--accent) 25%, transparent), inset 0 0 20px rgba(0,0,0,0.4);
      overflow: hidden;
      margin-bottom: 1.5rem;
      flex-shrink: 0;
    }

    .portrait-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: contrast(1.1) brightness(0.88) sepia(0.15) hue-rotate(-10deg);
    }

    .main-heading {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 900;
      color: var(--text);
      margin-bottom: 1rem;
      text-shadow: 0 0 20px var(--accent);
    }

    @keyframes skullGlowPulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 10px var(--accent); }
      50%       { transform: scale(1.2); text-shadow: 0 0 30px var(--accent), 0 0 60px color-mix(in srgb, var(--accent) 40%, transparent); }
    }

    #title-skull {
      display: inline-block;
      position: relative;
      animation: skullGlowPulse 3s ease-in-out infinite;
    }


    .subtext {
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: var(--text-dim);
      margin-bottom: 3rem;
      font-style: italic;
    }

    .button-area {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    #btn-yes {
      padding: 1rem 3rem;
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 700;
      background: var(--btn-yes-bg);
      color: var(--text);
      border: 1px solid var(--accent);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 50%, transparent), inset 0 1px 0 rgba(255,255,255,0.05);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    #btn-yes:hover {
      background: var(--btn-yes-hover);
      box-shadow: 0 0 32px var(--accent), 0 0 60px color-mix(in srgb, var(--accent) 30%, transparent);
      transform: translateY(-2px);
    }

    #btn-yes:active { transform: translateY(0); }

    #btn-no {
      padding: 1rem 3rem;
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 400;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid #444;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: transform 0.3s ease, opacity 0.3s ease, border-color 0.2s, color 0.2s, box-shadow 0.3s ease, filter 0.3s ease;
      position: relative;
    }

    #btn-no:hover {
      border-color: #666;
      color: #aaa;
    }

    #btn-no span.btn-no-text {
      position: relative;
      z-index: 1;
    }

    @keyframes crumble {
      0%   { transform: scale(1); filter: blur(0px); opacity: 1; }
      20%  { transform: scale(1.04) rotate(-1deg); filter: blur(0px); opacity: 1; }
      60%  { transform: scale(0.85) rotate(2deg); filter: blur(2px); opacity: 0.6; }
      100% { transform: scale(0.3) rotate(-5deg); filter: blur(8px); opacity: 0; }
    }

    .iron-frag-container {
      position: relative;
      display: inline-block;
    }

    .iron-frag {
      position: absolute;
      inset: 0;
      border: 1px solid #e8c84a;
      background: linear-gradient(180deg, #3a1a1a, #1a1a3e);
      color: #c0392b;
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .iron-frag-tl { clip-path: polygon(0 0, 55% 0, 45% 55%, 0 50%); animation: ironFragTL 0.45s ease forwards; }
    .iron-frag-tr { clip-path: polygon(45% 0, 100% 0, 100% 50%, 55% 55%); animation: ironFragTR 0.45s ease forwards; }
    .iron-frag-bl { clip-path: polygon(0 50%, 45% 55%, 40% 100%, 0 100%); animation: ironFragBL 0.45s ease forwards; }
    .iron-frag-br { clip-path: polygon(55% 55%, 100% 50%, 100% 100%, 40% 100%); animation: ironFragBR 0.45s ease forwards; }

    /* FF14 clipped-corner buttons — bun theme only */
    .bun-btn-yes {
      clip-path: polygon(10px 0%, 100% 0%, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0% 100%, 0% 10px) !important;
      background: linear-gradient(180deg, #5aa0e9, #3a78c8) !important;
      border: 1px solid #a8d4f8 !important;
      border-top: 2px solid #daeeff !important;
      box-shadow: 0 0 14px rgba(74,144,217,0.5), inset 0 1px 0 rgba(255,255,255,0.2) !important;
      letter-spacing: 3px !important;
    }
    .bun-btn-yes:hover {
      background: linear-gradient(180deg, #6ab0f9, #4a88d8) !important;
      box-shadow: 0 0 28px rgba(74,144,217,0.7), 0 0 50px rgba(74,144,217,0.3) !important;
    }
    .bun-btn-no {
      clip-path: polygon(10px 0%, 100% 0%, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0% 100%, 0% 10px) !important;
      background: linear-gradient(180deg, #1e3248, #162840) !important;
      border: 1px solid #a8c8e8 !important;
      color: #a8c8e8 !important;
      letter-spacing: 3px !important;
    }
    .bun-btn-no:hover {
      border-color: #daeeff !important;
      color: #daeeff !important;
    }
    .bun-btn-confirm {
      clip-path: polygon(10px 0%, 100% 0%, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0% 100%, 0% 10px) !important;
      background: linear-gradient(180deg, #5aa0e9, #3a78c8) !important;
      border: 1px solid #a8d4f8 !important;
      border-top: 2px solid #daeeff !important;
      box-shadow: 0 0 14px rgba(74,144,217,0.4) !important;
    }
    .bun-btn-confirm:hover {
      background: linear-gradient(180deg, #6ab0f9, #4a88d8) !important;
      box-shadow: 0 0 28px rgba(74,144,217,0.6) !important;
    }

    .theme-switcher {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .theme-btn {
      background: transparent;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 1.1rem;
      cursor: pointer;
      color: #888;
      transition: border-color 0.2s, box-shadow 0.2s, color 0.2s;
    }

    .theme-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .theme-btn-active {
      border-color: var(--accent);
      color: var(--text);
      box-shadow: 0 0 10px var(--accent);
    }
  </style>
</head>
<body>
  <div id="vanta-bg" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></div>
  <div id="vanta-birds" style="position:fixed;inset:0;z-index:0;pointer-events:none;display:none;"></div>
  <div class="theme-switcher">
    <button class="theme-btn theme-btn-active" data-theme="gothic" onclick="setTheme('gothic')">💀</button>
    <button class="theme-btn" data-theme="ironman" onclick="setTheme('ironman')">⚡</button>
    <button class="theme-btn" data-theme="bun" onclick="setTheme('bun')">🐰</button>
  </div>
  <div id="page1">
    <div class="portrait-frame">
      <img src="me.png" alt="" class="portrait-img">
    </div>
    <h1 class="main-heading" id="main-title">Will you date me? <span id="title-skull" data-gothic="💀" data-ironman="⚡" data-bun="🐰">💀</span></h1>
    <p class="subtext" data-gothic="Even death can't stop this feeling." data-ironman="I am Iron Man." data-bun="Hop to it.">Even death can't stop this feeling.</p>
    <div class="button-area">
      <button id="btn-yes" onclick="handleYesClick()" data-gothic="Yes 💀" data-ironman="Assemble ⚡" data-bun="Yes please! 🐰">Yes 💀</button>
      <button id="btn-no" onclick="handleNoClick()" data-gothic="No" data-ironman="Retreat" data-bun="Lettuce not."><span class="btn-no-text">No</span></button>
    </div>
  </div>
  <div id="celebration-overlay">
    <div id="celebration-text" data-gothic="SHE SAID YES 💀🖤" data-ironman="AVENGERS ASSEMBLE ⚡🔴" data-bun="SHE SAID YES 🐰🥕">SHE SAID YES 💀🖤</div>
  </div>

  <div id="page2">
    <h1 class="main-heading" data-gothic="What we feeling? 💀" data-ironman="Pick your mission. ⚡" data-bun="What's on the menu? 🐰">What we feeling? 💀</h1>
    <p class="subtext" data-gothic="Choose wisely." data-ironman="Choose your target." data-bun="Choose your carrot.">Choose wisely.</p>
    <div class="food-grid">
      <div class="food-card" data-food="Burger" onclick="pickFood(this)">
        <span class="food-emoji">🍔</span>
        <span class="food-label">Burger</span>
      </div>
      <div class="food-card" data-food="Sushi" onclick="pickFood(this)">
        <span class="food-emoji">🍣</span>
        <span class="food-label">Sushi</span>
      </div>
      <div class="food-card" data-food="Pizza" onclick="pickFood(this)">
        <span class="food-emoji">🍕</span>
        <span class="food-label">Pizza</span>
      </div>
      <div class="food-card" data-food="Coffee" onclick="pickFood(this)">
        <span class="food-emoji">☕</span>
        <span class="food-label">Coffee</span>
      </div>
    </div>
    <p id="food-confirmation" class="food-confirmation"></p>
  </div>
  <div id="page4">
    <div class="confirmed-skull" data-gothic="🖤" data-ironman="⚡" data-bun="🐰">🖤</div>
    <h1 class="main-heading confirmed-heading" data-gothic="It's official." data-ironman="Mission accepted." data-bun="Hare we go!">It's official.</h1>
    <p id="confirmed-date" class="confirmed-date"></p>

  <script>
    const btnYes = document.getElementById('btn-yes');
    const btnNo = document.getElementById('btn-no');


    let noClickCount = 0;
    let pickedFood = '';

    const THEMES = {
      gothic: {
        vars: {
          '--bg': '#0d0d0d',
          '--bg-secondary': '#1a1a1a',
          '--accent': '#8b0000',

          '--text-dim': '#888',

          '--btn-yes-hover': '#a80000',
          '--btn-no-bg': '#1a1a1a',

          '--font': "'Cinzel', serif",
        },
        particle: '🖤',
        copyPrefix: 'I said yes 🖤',
        copySuffix: "Don't be late. 💀",
        coffeeTarget: { emoji: '🍵', food: 'Matcha', label: 'Matcha' },
        coffeeYesText: 'She wants Matcha. You better deliver. 💀',
        coffeeNoEmoji: '🍍🥭',
        coffeeNoFood: 'Smoothie',
        coffeeNoLabel: 'Smoothie',
        coffeeConfirmText: 'Are you sure? 💀',
        celebrationEmojis: ['💀', '🦇', '🥀', '🖤', '🕸️', '☠️'],
        vanta: { effect: 'FOG', highlightColor: 0x3a0000, midtoneColor: 0x1a0000, lowlightColor: 0x0d0d0d, baseColor: 0x0d0d0d, blurFactor: 0.6, speed: 1.2, zoom: 0.8 },
      },
      ironman: {
        vars: {
          '--bg': '#0a0a1a',
          '--bg-secondary': '#1a1a3e',
          '--accent': '#c0392b',
          '--accent2': '#e8c84a',
          '--text': '#f0f0f0',
          '--text-dim': '#e8c84a',
          '--btn-yes-bg': '#c0392b',
          '--btn-yes-hover': '#e74c3c',
          '--btn-no-bg': '#1a1a3e',
          '--btn-no-border': '#e8c84a',
          '--font-heading': "'Impact', 'Arial Black', sans-serif",
          '--font': "'Cinzel', serif",
        },
        particle: '⚡',
        copyPrefix: 'Mission accepted ⚡',
        copySuffix: "Don't be late. 🔴",
        coffeeTarget: { emoji: '🍵', food: 'Matcha', label: 'Matcha' },
        coffeeYesText: 'She wants Matcha. You better deliver. ⚡',
        coffeeNoEmoji: '🍍🥭',
        coffeeNoFood: 'Smoothie',
        coffeeNoLabel: 'Smoothie',
        coffeeConfirmText: 'Are you sure? ⚡',

        vanta: { effect: 'NET', color: 0xc0392b, backgroundColor: 0x0a0a1a, points: 10, maxDistance: 22, spacing: 18, showDots: true },
      },

          '--accent2': '#1a3a6a',
          '--text': '#0d1e2e',
          '--text-dim': '#2a4a6a',
          '--btn-yes-bg': '#4a90d9',
          '--btn-yes-hover': '#5aa0e9',
          '--btn-no-bg': '#1e3248',
          '--btn-no-border': '#4a90d9',
          '--font-heading': "'Philosopher', serif",
          '--font': "'Philosopher', serif",
        },
        particle: '🐰',
        copyPrefix: 'I said yes 🐰',
        copySuffix: "Don't be late. 🥕",
        coffeeTarget: { emoji: '🥕', food: 'Carrot', label: 'Carrot' },
        coffeeYesText: 'She wants Carrot. Hop to it. 🐰',
        coffeeNoEmoji: '🥬',
        coffeeNoFood: 'Lettuce',
        coffeeNoLabel: 'Lettuce',
        coffeeConfirmText: 'Are you sure? 🐰',
        celebrationEmojis: ['🐰', '🥕', '🌾', '🥬', '🌸', '✨'],
        vanta: { effect: 'CLOUDS', backgroundColor: 0xffffff, skyColor: 0x4caee3, cloudColor: 0x96a9d7, cloudShadowColor: 0x969696, sunColor: 0xff8f00, sunGlareColor: 0xff3d00, sunlightColor: 0xff9933, speed: 1 },
      },
    };

    const urlTheme = new URLSearchParams(window.location.search).get('theme');
    let activeTheme = (urlTheme && THEMES[urlTheme]) ? urlTheme : (localStorage.getItem('theme') || 'gothic');
    let vantaEffect = null;
    let vantaBirds = null;

    function initVanta(name) {
      if (vantaEffect) { vantaEffect.destroy(); vantaEffect = null; }
      if (vantaBirds) { vantaBirds.destroy(); vantaBirds = null; }

      const birdsEl = document.getElementById('vanta-birds');

      if (name === 'gothic' && window.VANTA && window.VANTA.BIRDS) {
        birdsEl.style.display = 'block';
        vantaBirds = window.VANTA.BIRDS({
          el: '#vanta-birds',
          THREE: window.THREE,
          backgroundColor: 0x000000,
          color1: 0x1a0000,
          color2: 0x0d0d0d,
          colorMode: 'variance',
          birdSize: 1.2,
          wingSpan: 28,
          speedLimit: 3,
          separation: 80,
          alignment: 50,
          cohesion: 50,
          quantity: 3,
          backgroundAlpha: 0,
        });
      } else {
        birdsEl.style.display = 'none';
      }

      const cfg = THEMES[name] && THEMES[name].vanta;
      if (!cfg || !window.VANTA) return;
      const { effect, ...opts } = cfg;
      const fn = window.VANTA[effect];
      if (!fn) return;
      vantaEffect = fn({ el: '#vanta-bg', THREE: window.THREE, ...opts });
    }

    function setTheme(name) {
      const theme = THEMES[name];
      if (!theme) return;
      activeTheme = name;
      localStorage.setItem('theme', name);

      const root = document.documentElement;
      Object.entries(theme.vars).forEach(([k, v]) => root.style.setProperty(k, v));

      document.querySelectorAll(`[data-${name}]`).forEach(el => {
        if (el.id === 'btn-no') {
          const textEl = el.querySelector('.btn-no-text');
          if (textEl) textEl.textContent = el.getAttribute(`data-${name}`);
        } else {
          el.textContent = el.getAttribute(`data-${name}`);
        }
      });

      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('theme-btn-active', btn.dataset.theme === name);
      });

      const ironGif = document.getElementById('ironman-gif');
      const gothGif = document.getElementById('gothic-gif');
      const bunGif = document.getElementById('bun-gif');
      if (ironGif) ironGif.style.display = name === 'ironman' ? 'block' : 'none';
      if (gothGif) gothGif.style.display = name === 'gothic' ? 'block' : 'none';
      if (bunGif) bunGif.style.display = name === 'bun' ? 'block' : 'none';

      const btnYes = document.getElementById('btn-yes');
      const btnNo = document.getElementById('btn-no');
      const confirmBtns = document.querySelectorAll('.confirm-btn');
      const isBun = name === 'bun';
      if (btnYes) { btnYes.classList.toggle('bun-btn-yes', isBun); }
      if (btnNo) { btnNo.classList.toggle('bun-btn-no', isBun); }
      confirmBtns.forEach(b => b.classList.toggle('bun-btn-confirm', isBun));

      document.body.classList.toggle('bun-theme', name === 'bun');

      initVanta(name);
    }
    const NO_MAX_CLICKS = 5;

    const CELEBRATION_EMOJIS = ['💀', '🦇', '🥀', '🖤', '🕸️', '☠️'];


    function spawnEmoji() {
      const el = document.createElement('span');
      el.className = 'float-emoji';
      const emojis = THEMES[activeTheme].celebrationEmojis;
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.bottom = '-2rem';
      const duration = 1.5 + Math.random() * 2;
      el.style.animationDuration = duration + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), duration * 1000);
    }

    function celebrate() {
      const overlay = document.getElementById('celebration-overlay');
      overlay.classList.add('active');
      let spawned = 0;
      const interval = setInterval(() => {
        for (let i = 0; i < 5; i++) spawnEmoji();
        spawned++;
        if (spawned >= 10) clearInterval(interval);
      }, 200);
      setTimeout(showPage2, 2500);
    }

    function handleYesClick() {
      celebrate();
    }

    function showPage2() {
      document.getElementById('page1').style.display = 'none';
      document.getElementById('celebration-overlay').style.display = 'none';
      document.getElementById('page2').style.display = 'flex';
    }

    function pickFood(card) {
      document.querySelectorAll('.food-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      const food = card.dataset.food;

      if (food === 'Coffee') {
        morphCoffeeToMatcha(card);
        return;
      }

      pickedFood = food;
      const el = document.getElementById('food-confirmation');
      el.textContent = `She wants ${food}. You better deliver. ${THEMES[activeTheme].particle}`;
      removeCoffeeConfirmBtns();
      setTimeout(showPage3, 1800);
    }

    function morphCoffeeToMatcha(card) {
      const emojiEl = card.querySelector('.food-emoji');
      const labelEl = card.querySelector('.food-label');
      const confirmEl = document.getElementById('food-confirmation');
      const target = THEMES[activeTheme].coffeeTarget;

      emojiEl.classList.add('fade-out');

      setTimeout(() => {
        emojiEl.textContent = target.emoji;
        card.dataset.food = target.food;
        labelEl.textContent = target.label;
        emojiEl.classList.remove('fade-out');
      }, 300);

      confirmEl.textContent = THEMES[activeTheme].coffeeConfirmText;
      showCoffeeConfirmBtns(card);
    }

    function showCoffeeConfirmBtns(card) {
      removeCoffeeConfirmBtns();
      const confirmEl = document.getElementById('food-confirmation');
      const btns = document.createElement('div');
      btns.className = 'food-confirm-btns';
      btns.id = 'coffee-confirm-btns';

      const yes = document.createElement('button');
      yes.textContent = 'Yes';
      yes.onclick = () => {
        pickedFood = THEMES[activeTheme].coffeeTarget.food;
        removeCoffeeConfirmBtns();
        confirmEl.textContent = THEMES[activeTheme].coffeeYesText;
        setTimeout(showPage3, 1800);
      };

      const no = document.createElement('button');
      no.textContent = 'No';
      no.onclick = () => resetCoffeeToSmoothie(card);

      btns.appendChild(yes);
      btns.appendChild(no);
      confirmEl.insertAdjacentElement('afterend', btns);
    }

    function removeCoffeeConfirmBtns() {
      const existing = document.getElementById('coffee-confirm-btns');
      if (existing) existing.remove();
    }

    function resetCoffeeToSmoothie(card) {
      const emojiEl = card.querySelector('.food-emoji');
      const labelEl = card.querySelector('.food-label');
      const confirmEl = document.getElementById('food-confirmation');
      const theme = THEMES[activeTheme];

      emojiEl.classList.add('fade-out');

      setTimeout(() => {
        emojiEl.textContent = theme.coffeeNoEmoji;
        card.dataset.food = theme.coffeeNoFood;
        labelEl.textContent = theme.coffeeNoLabel;
        emojiEl.classList.remove('fade-out');
      }, 300);

      card.classList.remove('selected');
      confirmEl.textContent = '';
      removeCoffeeConfirmBtns();
    }

    function showPage3() {
      document.getElementById('page2').style.display = 'none';
      document.getElementById('page3').style.display = 'flex';
    }

    function confirmDate() {
      const date = document.getElementById('date-input').value;
      const time = document.getElementById('time-input').value;
      if (!date || !time) {
        document.getElementById('date-confirmation').textContent = 'Pick both a date and time, mortal. 💀';
        return;
      }
      const formatted = new Date(date + 'T' + time).toLocaleString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
      document.getElementById('confirmed-date').textContent = formatted;
      document.getElementById('page3').style.display = 'none';
      document.getElementById('page4').style.display = 'flex';
      launchCelebration();
    }

    function copyResult() {
      const date = document.getElementById('confirmed-date').textContent;
      const t = THEMES[activeTheme];
      const text = `${t.copyPrefix} ${pickedFood} on ${date}. ${t.copySuffix}`;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied 💀';
        setTimeout(() => btn.textContent = 'Copy 🖤', 2000);
      });
    }

    function launchCelebration() {
      let spawned = 0;
      const interval = setInterval(() => {
        for (let i = 0; i < 4; i++) spawnEmoji();
        spawned++;
        if (spawned >= 15) clearInterval(interval);
      }, 300);
      if (activeTheme === 'ironman') {
        playArcReactor();
      } else if (activeTheme === 'bun') {
        playBunMelody();
      } else {
        playFFVictory();
      }
    }

    function playFFVictory() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      // Organ pipe sound: fundamental + harmonics via additive synthesis
      function organNote(freq, start, dur, vol = 0.18) {
        const t = ctx.currentTime + start;
        [1, 2, 3, 4].forEach((harmonic, i) => {
          const osc = ctx.createOscillator();
          const env = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq * harmonic;
          const hVol = vol / (i + 1);
          env.gain.setValueAtTime(0, t);
          env.gain.linearRampToValueAtTime(hVol, t + 0.04);
          env.gain.setValueAtTime(hVol, t + dur - 0.08);
          env.gain.linearRampToValueAtTime(0, t + dur);
          osc.connect(env);
          env.connect(ctx.destination);
          osc.start(t);
          osc.stop(t + dur + 0.1);
        });
      }

      // Chord = multiple notes at once
      function chord(freqs, start, dur, vol) {
        freqs.forEach(f => organNote(f, start, dur, vol));
      }

      // Bach Toccata and Fugue in D minor — iconic opening
      // Single high A stab
      organNote(880.00, 0.00, 0.25);

      // Rapid descending run A5→D5
      organNote(880.00, 0.35, 0.08);
      organNote(783.99, 0.43, 0.08);
      organNote(698.46, 0.51, 0.08);
      organNote(659.25, 0.59, 0.08);
      organNote(587.33, 0.67, 0.35);

      // Full D minor chord crash
      chord([146.83, 220.00, 293.66, 349.23, 440.00, 587.33], 1.1, 0.55, 0.15);

      // Descending bass line D→C→B→Bb
      organNote(293.66, 1.75, 0.28);
      organNote(261.63, 2.05, 0.28);
      organNote(246.94, 2.35, 0.28);
      organNote(233.08, 2.65, 0.45);

      // Final A minor resolution chord
      chord([110.00, 164.81, 220.00, 329.63, 440.00], 3.2, 1.4, 0.16);
    }

    function playArcReactor() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      // Rising hum — low sine sweeping up over 1.5s
      const hum = ctx.createOscillator();
      const humGain = ctx.createGain();
      hum.type = 'sine';
      hum.frequency.setValueAtTime(60, ctx.currentTime);
      hum.frequency.linearRampToValueAtTime(220, ctx.currentTime + 1.5);
      humGain.gain.setValueAtTime(0, ctx.currentTime);
      humGain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 0.3);
      humGain.gain.linearRampToValueAtTime(0.0, ctx.currentTime + 1.5);
      hum.connect(humGain);
      humGain.connect(ctx.destination);
      hum.start(ctx.currentTime);
      hum.stop(ctx.currentTime + 1.5);

      // Electronic pulse clicks — rapid beeps building tension
      [0.3, 0.55, 0.75, 0.9, 1.0, 1.08, 1.14].forEach((t, i) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = 440 + i * 80;
        g.gain.setValueAtTime(0.12, ctx.currentTime + t);
        g.gain.linearRampToValueAtTime(0, ctx.currentTime + t + 0.07);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.1);
      });

      // Triumphant power chord at 1.6s — E major with metallic overtones
      [[82.41, 123.47, 164.81, 246.94], // E2 B2 E3 B3
       [329.63, 415.30, 493.88]          // E4 Ab4 B4
      ].flat().forEach(freq => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        const t = ctx.currentTime + 1.6;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.08, t + 0.04);
        g.gain.setValueAtTime(0.08, t + 0.8);
        g.gain.linearRampToValueAtTime(0, t + 1.4);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start(t);
        osc.stop(t + 1.5);
      });
    }

    function playBunMelody() {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      function bell(freq, start, dur, vol = 0.12) {
        const t = ctx.currentTime + start;
        // Sine fundamental + gentle 2nd harmonic for bell tone
        [1, 2].forEach((h, i) => {
          const osc = ctx.createOscillator();
          const env = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq * h;
          const hVol = vol / (i + 1.5);
          env.gain.setValueAtTime(0, t);
          env.gain.linearRampToValueAtTime(hVol, t + 0.02);
          env.gain.exponentialRampToValueAtTime(0.001, t + dur);
          osc.connect(env);
          env.connect(ctx.destination);
          osc.start(t);
          osc.stop(t + dur + 0.1);
        });
      }

      // Gentle ascending FF14-style melody in D major — soft harp bell feel
      // D4 F#4 A4 D5 — then a little flourish
      const melody = [
        [293.66, 0.00, 0.6],   // D4
        [369.99, 0.35, 0.6],   // F#4
        [440.00, 0.65, 0.6],   // A4
        [587.33, 1.00, 0.8],   // D5
        [493.88, 1.55, 0.4],   // B4
        [440.00, 1.85, 0.4],   // A4
        [523.25, 2.15, 0.4],   // C5
        [587.33, 2.45, 1.2],   // D5 — hold
        // Final soft chord
        [293.66, 3.00, 1.4, 0.07],
        [369.99, 3.00, 1.4, 0.07],
        [440.00, 3.00, 1.4, 0.07],
        [587.33, 3.00, 1.4, 0.07],
      ];

      melody.forEach(([freq, start, dur, vol]) => bell(freq, start, dur, vol));
    }

    let bunHopOffset = 0;
    let bunHopCount = 0;
    let ironHitCount = 0;

    function setupBunNoHover() {}

    function handleNoClick() {
      if (activeTheme === 'ironman') {
        ironHitCount++;

        if (ironHitCount === 1) {
          btnNo.textContent = 'REROUTING...';
          btnNo.style.borderColor = '#c0392b';
          btnNo.style.color = '#c0392b';
          btnNo.style.boxShadow = '0 0 12px #c0392b, inset 0 0 20px rgba(192,57,43,0.3)';
          btnNo.style.animation = 'none';
          btnNo.offsetHeight;
          btnNo.style.animation = 'ironShake1 0.35s ease';
          setTimeout(() => { btnNo.style.animation = ''; }, 380);
          return;
        }

        if (ironHitCount === 2) {
          btnNo.textContent = 'OVERRIDE FAILED';
          btnNo.style.borderColor = '#e8c84a';
          btnNo.style.color = '#e8c84a';
          btnNo.style.boxShadow = '0 0 18px #e8c84a, inset 0 0 30px rgba(232,200,74,0.2)';
          btnNo.style.animation = 'none';
          btnNo.offsetHeight;
          btnNo.style.animation = 'ironShake2 0.4s ease';
          setTimeout(() => { btnNo.style.animation = ''; }, 420);
          return;
        }

        if (ironHitCount >= 3) {
          btnNo.textContent = 'ACCESS DENIED ⚡';
          btnNo.style.borderColor = '#c0392b';
          btnNo.style.color = '#c0392b';
          btnNo.style.animation = 'none';

          setTimeout(() => {
            const rect = btnNo.getBoundingClientRect();
            const container = document.createElement('div');
            container.className = 'iron-frag-container';
            container.style.width = btnNo.offsetWidth + 'px';
            container.style.height = btnNo.offsetHeight + 'px';

            ['tl','tr','bl','br'].forEach(pos => {
              const frag = document.createElement('div');
              frag.className = `iron-frag iron-frag-${pos}`;
              frag.textContent = 'ACCESS DENIED ⚡';
              container.appendChild(frag);
            });

            btnNo.replaceWith(container);
            setTimeout(() => container.remove(), 480);
          }, 300);
          return;
        }
      }

      if (activeTheme === 'bun') {
        bunHopCount++;

        if (bunHopCount >= 3) {
          btnNo.style.setProperty('--bun-x', bunHopOffset + 'px');
          btnNo.style.animation = 'none';
          btnNo.offsetHeight;
          btnNo.style.animation = `bunFlyOff 0.6s ease forwards`;
          setTimeout(() => btnNo.remove(), 650);
          return;
        }

        btnNo.style.setProperty('--bun-x', bunHopOffset + 'px');
        btnNo.style.animation = 'none';
        btnNo.offsetHeight;
        btnNo.style.animation = `bunSingleHop 0.4s ease forwards`;
        setTimeout(() => {
          bunHopOffset += 36;
          btnNo.style.animation = 'none';
          btnNo.style.transform = `translateX(${bunHopOffset}px)`;
        }, 420);
        return;
      }

      if (activeTheme === 'gothic') {
        noClickCount++;
        const textEl = btnNo.querySelector('.btn-no-text');
        const crackColors = ['#555', '#6a0030', '#8b0000'];
        const crackShadows = [
          '',
          '2px 0 0 #3a0000, -1px 0 0 #3a0000, inset 1px 0 0 rgba(139,0,0,0.3)',
          '3px 0 0 #6a0000, -2px 0 0 #6a0000, 0 2px 0 #3a0000, inset 2px 0 0 rgba(139,0,0,0.5), inset -1px 0 0 rgba(139,0,0,0.3)',
        ];
        const labels = ['No', '...no', 'please no', 'I said please!', '💀'];

        btnNo.style.borderColor = crackColors[Math.min(noClickCount - 1, 2)];
        btnNo.style.boxShadow = crackShadows[Math.min(noClickCount - 1, 2)];
        if (textEl) textEl.textContent = labels[Math.min(noClickCount, 4)];

        if (noClickCount >= 4) {
          setTimeout(() => {
            btnNo.style.animation = 'crumble 0.7s ease forwards';
            setTimeout(() => btnNo.remove(), 720);
          }, 600);
        }
        return;
      }

      noClickCount++;
      const scale = Math.max(0, 1 - noClickCount * 0.18);
      btnNo.style.transform = `scale(${scale})`;
      btnNo.style.opacity = scale;

      if (noClickCount >= NO_MAX_CLICKS) {
        btnNo.style.transition = 'transform 0.3s ease, opacity 0.5s ease';
        btnNo.style.opacity = '0';
        setTimeout(() => btnNo.remove(), 500);
      }
    }

    setupBunNoHover();

    // Apply saved theme on load
    setTheme(activeTheme);
  </script>
</body>
</html>
